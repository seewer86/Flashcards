services:
  web:
    build: .
    container_name: e-learning
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: db-e-learning
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: <your_super_root_secret>
      MYSQL_DATABASE: e-learning
      MYSQL_USER: e-learning
      MYSQL_PASSWORD: <your_super_secret>
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin-e-learning
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: <your_super_root_secret>
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  db_data:

